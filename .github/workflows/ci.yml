name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, 'feature/**', 'release/**']
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  MAVEN_OPTS: '-Xmx1024m -XX:MaxMetaspaceSize=512m'

jobs:
  # ============================================================
  # Job 1: Backend — Compile & Unit Tests
  # ============================================================
  backend-test:
    name: 'Backend: Compile & Test'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile (skip tests)
        run: cd backend && mvn clean install -DskipTests -q

      - name: Run Unit Tests
        run: cd backend && mvn verify

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/target/surefire-reports/
            backend/**/target/failsafe-reports/

  # ============================================================
  # Job 2: Frontend — Type-Check & Build
  # ============================================================
  frontend-build:
    name: 'Frontend: Build'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Type-Check & Build
        run: cd frontend-web && npm run build

  # ============================================================
  # Job 3: E2E — Playwright Full-Stack Tests
  # ============================================================
  e2e:
    name: 'E2E: Playwright'
    needs: [backend-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nexora
        ports:
          - '3306:3306'
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend (skip tests)
        run: cd backend && mvn clean package -DskipTests -q

      - name: Start Backend
        run: |
          cd backend
          JAR=$(ls nexora-app/target/nexora-app-*.jar | head -1)
          nohup java -jar "$JAR" --spring.profiles.active=dev > /tmp/backend.log 2>&1 &
          echo "Waiting for backend health endpoint..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health | grep -q '200\|503\|UP\|DOWN'; then
              echo "Backend is up (attempt $i)"
              break
            fi
            sleep 2
          done
          # Print tail of log for debugging
          echo "=== Backend log tail ==="
          tail -50 /tmp/backend.log

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Install Playwright Browsers
        run: cd frontend-web && npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: cd frontend-web && npx playwright test

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            frontend-web/test-results/
            /tmp/backend.log

  # ============================================================
  # Job 4: Build Artifacts (on push to master/develop only)
  # ============================================================
  build:
    name: 'Build Artifacts'
    needs: [backend-test, frontend-build, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend JAR
        run: cd backend && mvn clean package -DskipTests -q

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Build Frontend
        run: cd frontend-web && npm ci && npm run build

      - name: Stage Artifacts
        run: |
          mkdir -p artifacts
          cp backend/nexora-app/target/nexora-app-*.jar artifacts/nexora-app.jar
          cp -r frontend-web/dist artifacts/frontend-dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexora-build
          path: artifacts/
          retention-days: 7
