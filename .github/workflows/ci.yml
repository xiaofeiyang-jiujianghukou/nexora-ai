name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, 'feature/**', 'release/**']
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  MAVEN_OPTS: '-Xmx1024m -XX:MaxMetaspaceSize=512m'

jobs:
  # ============================================================
  # Job 1: Backend — Compile
  # ============================================================
  backend-compile:
    name: 'Backend: Compile'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile (skip tests)
        run: cd backend && mvn clean install -DskipTests -q

  # ============================================================
  # Job 2: Frontend — Type-Check & Build
  # ============================================================
  frontend-build:
    name: 'Frontend: Build'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Type-Check & Build
        run: cd frontend-web && npm run build

  # ============================================================
  # Job 3: Build Artifacts (on push to master/develop only)
  # ============================================================
  build:
    name: 'Build Artifacts'
    needs: [backend-compile, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend JAR
        run: cd backend && mvn clean package -DskipTests -q

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Build Frontend
        run: cd frontend-web && npm ci && npm run build

      - name: Stage Artifacts
        run: |
          mkdir -p artifacts
          cp backend/nexora-app/target/nexora-app-*.jar artifacts/nexora-app.jar
          cp -r frontend-web/dist artifacts/frontend-dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexora-build
          path: artifacts/
          retention-days: 7

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Backend Docker tags
        id: be-tags
        run: |
          REPO="${{ secrets.ACR_REGISTRY }}/xiaofeiyang930112/nexora-app"
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha_tag=$REPO:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_tag=$REPO:latest" >> $GITHUB_OUTPUT

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.be-tags.outputs.sha_tag }}
            ${{ steps.be-tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set Frontend Docker tags
        id: fe-tags
        run: |
          REPO="${{ secrets.ACR_REGISTRY }}/xiaofeiyang930112/nexora-frontend"
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha_tag=$REPO:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_tag=$REPO:latest" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: frontend-web
          push: true
          tags: |
            ${{ steps.fe-tags.outputs.sha_tag }}
            ${{ steps.fe-tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
