# ============================================================
# Nexora AI — 纯应用版（MySQL + Redis 用宿主机已有实例）
# 用法: docker compose -f deploy/docker-compose-cloud.yml up -d
#
# 前提：宿主机已有 MySQL 和 Redis，创建好 nexora 库
# 总内存: ~650MB，2C2G 足够
# ============================================================
version: '3.8'

services:
  # ============================================================
  # Nexora Backend — 384MB
  # ============================================================
  nexora-backend:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/nexora-app:latest
    container_name: nexora-backend
    restart: unless-stopped
    network_mode: host
    # host 模式下直接使用宿主机网络栈
    environment:
      SPRING_PROFILES_ACTIVE: slim
      NEXORA_DB_URL: ${NEXORA_DB_URL}
      NEXORA_DB_USERNAME: ${NEXORA_DB_USERNAME}
      NEXORA_DB_PASSWORD: ${NEXORA_DB_PASSWORD}
      NEXORA_REDIS_HOST: ${NEXORA_REDIS_HOST:-localhost}
      NEXORA_REDIS_PORT: ${NEXORA_REDIS_PORT:-6379}
      NEXORA_REDIS_PASSWORD: ${NEXORA_REDIS_PASSWORD:-}
      NEXORA_LLM_API_KEY: ${NEXORA_LLM_API_KEY:-}
      NEXORA_LLM_MODEL: ${NEXORA_LLM_MODEL:-deepseek-v4-pro}
      ES_ENABLED: "false"
      ROCKETMQ_ENABLED: "false"
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ============================================================
  # Nexora Frontend — 48MB
  # ============================================================
  nexora-frontend:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/nexora-frontend:latest
    container_name: nexora-frontend
    restart: unless-stopped
    network_mode: host

  # ============================================================
  # Prometheus — 128MB
  # ============================================================
  prometheus:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/prometheus:v3.3.0
    container_name: nexora-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=256MB'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  # ============================================================
  # Grafana — 96MB
  # ============================================================
  grafana:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/grafana:11.6.0
    container_name: nexora-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
