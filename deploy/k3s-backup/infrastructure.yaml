# ============================================================
# 基础设施 — MySQL, Redis, Elasticsearch (ACR 镜像)
# ============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: nexora
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              value: "nexora"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits: {cpu: "500m", memory: "1Gi"}
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-mysql
  namespace: nexora
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nexora
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits: {cpu: "200m", memory: "256Mi"}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-redis
  namespace: nexora
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: nexora
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/elasticsearch:8.15.0-ik
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 9200
            - containerPort: 9300
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits: {cpu: "500m", memory: "1Gi"}
          livenessProbe:
            exec:
              command: ["curl", "-s", "http://localhost:9200/_cluster/health"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-es
  namespace: nexora
spec:
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9300
      targetPort: 9300
      name: transport
  selector:
    app: elasticsearch
---
# RocketMQ NameServer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-namesrv
  namespace: nexora
  labels:
    app: rocketmq-namesrv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-namesrv
  template:
    metadata:
      labels:
        app: rocketmq-namesrv
    spec:
      containers:
        - name: rocketmq-namesrv
          image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/rocketmq:5.2.0
          command: ["sh", "mqnamesrv"]
          env:
            - name: JAVA_OPT_EXT
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 9876
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          livenessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-rmq-namesrv
  namespace: nexora
spec:
  ports:
    - port: 9876
      targetPort: 9876
  selector:
    app: rocketmq-namesrv
---
# RocketMQ Broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-broker
  namespace: nexora
  labels:
    app: rocketmq-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
        - name: rocketmq-broker
          image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/rocketmq:5.2.0
          command: ["sh", "mqbroker", "-n", "nexora-rmq-namesrv:9876", "--enable-proxy"]
          env:
            - name: JAVA_OPT_EXT
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 10911
            - containerPort: 10909
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          livenessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 20
            periodSeconds: 10
