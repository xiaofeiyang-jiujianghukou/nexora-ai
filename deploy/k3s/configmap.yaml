apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora
data:
  SPRING_PROFILES_ACTIVE: "prod"
  REDIS_HOST: "nexora-redis"
  REDIS_PORT: "6379"
  ES_ENABLED: "true"
  SPRING_ELASTICSEARCH_URIS: "http://nexora-es:9200"
  LLM_BASE_URL: "https://api.deepseek.com"
  LLM_MODEL: "deepseek-v4-pro"
  SENTRY_DSN: ""
  APP_VERSION: "1.0.0"
  JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
