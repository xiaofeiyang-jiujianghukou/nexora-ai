global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nexora-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["nexora-backend:8080"]
        labels:
          app: "nexora"
          component: "backend"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
